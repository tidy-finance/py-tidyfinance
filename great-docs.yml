# API Reference Structure
# -----------------------
# Customize the sections below to organize your API documentation.
# - Reorder items within a section to change their display order
# - Move items between sections or create new sections
# - Use 'members: false' to exclude methods from documentation
# - Add 'desc:' to sections for descriptions

reference:
  - title: Data download
    desc: Download and discover datasets.
    contents:
      - data_download.download_data
      - data_download.get_available_famafrench_datasets
  - title: Portfolio sorts
    desc: Construct breakpoints, assign portfolios, and compute sorted returns.
    contents:
      - core.assign_portfolio
      - core.compute_breakpoints
      - core.breakpoint_options
      - core.portfolio_sort_options
      - core.filter_options
      - core.filter_sorting_data
      - core.implement_portfolio_sort
      - core.compute_portfolio_returns
      - core.compute_long_short_returns
      - core.data_options
  - title: Model estimation
    desc: Estimate linear, rolling-beta, and Fama-MacBeth models.
    contents:
      - core.estimate_model
      - core.estimate_betas
      - core.estimate_fama_macbeth
  - title: Data transformation
    desc: Lag, roll, summarize, and clean variables.
    contents:
      - core.add_lagged_columns
      - core.join_lagged_values
      - core.compute_rolling_value
      - core.create_summary_statistics
      - utilities.winsorize
      - utilities.trim
  - title: WRDS access
    desc: Connect to WRDS and manage credentials.
    contents:
      - utilities.get_wrds_connection
      - utilities.disconnect_connection
      - utilities.set_wrds_credentials
      - utilities.load_wrds_credentials
      - utilities.process_trace_data
  - title: Backend
    desc: Switch the data-frame backend between pandas and polars.
    contents:
      - backend.set_backend
      - backend.get_backend
      - backend.use_backend
  - title: Catalog and resources
    desc: List supported datasets and open Tidy Finance resources.
    contents:
      - supported_datasets.list_supported_datasets
      - utilities.list_supported_indexes
      - utilities.list_tidy_finance_chapters
      - utilities.open_tidy_finance_website

# Site URL
# --------
# Canonical address of the deployed documentation site.
# Required for subdirectory deployments, skills page install commands,
# .well-known/ discovery, and sitemaps.
site_url: "https://library.tidy-finance.org/"

# Site Settings
# -------------
# site:
#   theme: flatly              # Quarto theme (default: flatly)
#   toc: true                  # Show table of contents (default: true)
#   toc-depth: 2               # TOC heading depth (default: 2)
#   toc-title: On this page    # TOC title (default: "On this page")

# Jupyter Kernel
# --------------
# Jupyter kernel to use for executing code cells in .qmd files.
# This is set at the project level so it applies to all pages, including
# auto-generated API reference pages. Can be overridden in individual .qmd
# file frontmatter if needed for special cases.
jupyter: python3

# CLI Documentation
# -----------------
# cli:
#   enabled: true              # Enable CLI documentation
#   module: my_package.cli     # Module containing Click commands
#   name: cli                  # Name of the Click command object
